syntax = "proto3";

package optimizer;

service RouteOptimizer {
  rpc SolveRoute (SolveRouteRequest) returns (SolveRouteResponse);
}

message Vehicle {
  string id = 1;
  double lat = 2;
  double lng = 3;
  int32 capacity = 4;
}

message Stop {
  string id = 1;
  double lat = 2;
  double lng = 3;
  int32 demand = 4;
  int32 priority = 5;
}

message SolveRouteRequest {
  string event_type = 1;
  repeated Vehicle vehicles = 2;
  repeated Stop stops = 3;
}

message RouteStep {
  string stop_id = 1;
  double lat = 2;
  double lng = 3;
  int32 arrival_order = 4;
}

message VehicleRoute {
  string vehicle_id = 1;
  repeated RouteStep steps = 2;
  double total_distance = 3;
  double estimated_time = 4;
}

message SolveRouteResponse {
  repeated VehicleRoute routes = 1;
  double total_cost = 2;
  string solved_at = 3;
}
